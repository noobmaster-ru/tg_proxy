name: Deploy 

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  deploy:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Prepare SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          KEY_FILE=~/.ssh/id_deploy

          # Support raw key, escaped "\n" key, or base64-encoded key in the same secret.
          if echo "$SSH_PRIVATE_KEY" | grep -q "BEGIN OPENSSH PRIVATE KEY"; then
            printf '%s\n' "$SSH_PRIVATE_KEY" | tr -d '\r' > "$KEY_FILE"
          elif echo "$SSH_PRIVATE_KEY" | grep -q "BEGIN RSA PRIVATE KEY"; then
            printf '%s\n' "$SSH_PRIVATE_KEY" | tr -d '\r' > "$KEY_FILE"
          elif echo "$SSH_PRIVATE_KEY" | grep -q "\\\\n"; then
            printf '%s' "$SSH_PRIVATE_KEY" | sed 's/\\\\n/\n/g' | tr -d '\r' > "$KEY_FILE"
          else
            printf '%s' "$SSH_PRIVATE_KEY" | tr -d '\r' | base64 -d > "$KEY_FILE"
          fi

          chmod 600 "$KEY_FILE"
          ssh-keygen -y -f "$KEY_FILE" >/dev/null

      - name: Add host to known_hosts
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
        run: |
          ssh-keyscan -p "$DEPLOY_PORT" "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Upload project archive
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          tar --exclude='.git' --exclude='.github' -czf /tmp/tg_proxy.tar.gz .
          ssh -i ~/.ssh/id_deploy -o IdentitiesOnly=yes -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p '$DEPLOY_PATH'"
          scp -i ~/.ssh/id_deploy -o IdentitiesOnly=yes -P "$DEPLOY_PORT" /tmp/tg_proxy.tar.gz "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/tg_proxy.tar.gz"

      - name: Deploy on server
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          ssh -i ~/.ssh/id_deploy -o IdentitiesOnly=yes -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "\
            set -euo pipefail; \
            mkdir -p '$DEPLOY_PATH'; \
            tar -xzf '$DEPLOY_PATH/tg_proxy.tar.gz' -C '$DEPLOY_PATH'; \
            rm -f '$DEPLOY_PATH/tg_proxy.tar.gz'; \
            cd '$DEPLOY_PATH'; \
            docker compose up --build -d; \
          "
